apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-inference
  namespace: llm
  labels:
    app: llm-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-inference
  template:
    metadata:
      labels:
        app: llm-inference
    spec:
      # Land on the GPU node group and tolerate its taint. These must match the
      # label/taint set on the "gpu" node group in the compute module.
      nodeSelector:
        workload-type: gpu-inference
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: llama-server
          # Logical image name — kustomize rewrites this to the real ECR URI at
          # deploy time (see k8s/kustomization.yaml; CI runs `kustomize edit set
          # image llm-inference=<ecr-url>:<tag>`). For a manual deploy, either
          # run `kustomize edit set image ...` too, or replace this line with the
          # URI build-and-push.sh printed, e.g.
          #   582287676709.dkr.ecr.us-east-1.amazonaws.com/aws-llm-ecr:sha-<sha>
          image: llm-inference:latest
          ports:
            - containerPort: 8080
          resources:
            # Requesting a GPU is what makes the scheduler place this on a GPU
            # node (and the NVIDIA device plugin makes the resource available).
            limits:
              nvidia.com/gpu: 1
              memory: "8Gi"
            requests:
              cpu: "1"
              memory: "4Gi"
          # llama-server serves /health once the model is loaded. Give it a
          # generous startup window since the model loads into GPU memory first.
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 20
